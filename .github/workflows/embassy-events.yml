name: Embassy Cultural Events — Brasília

on:
  schedule:
    # Toda segunda-feira às 08:00 BRT (11:00 UTC)
    - cron: "0 11 * * 1"
  workflow_dispatch:  # permite disparar manualmente

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install instaloader

      - name: Run scraper & send e-mail
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
        run: python scraper.py

      - name: Salva data de execução no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git diff --cached --quiet || git commit -m "chore: atualiza last_run [skip ci]"
          git push
