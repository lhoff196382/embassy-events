name: Adicionar site via Issue

on:
  issues:
    types: [opened, reopened]

jobs:
  add-site:
    if: contains(github.event.issue.labels.*.name, 'add-site')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Processar issue e atualizar sources.json
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PYEOF'
          import os, json, re, sys

          body = os.environ.get("ISSUE_BODY", "")

          def extract(label):
              pattern = rf"### {label}\s*\n+([^\n#]+)"
              m = re.search(pattern, body, re.IGNORECASE)
              val = m.group(1).strip() if m else ""
              return "" if val.lower() in ("_no response_", "none", "") else val

          name     = extract("Nome do site")
          url      = extract("URL da pagina de eventos") or extract("URL")
          category = extract("Categoria") or "Outro"
          flag     = extract("Emoji da bandeira.*?") or ""

          # Remove emojis do flag para evitar problemas de encoding
          flag = re.sub(r'[^\x00-\x7F]', '', flag).strip() or "?"

          if not name or not url:
              print("ERRO: nome ou URL nao encontrados na issue")
              sys.exit(1)

          if not url.startswith("http"):
              print("ERRO: URL invalida")
              sys.exit(1)

          path = "sources.json"
          with open(path, encoding="utf-8") as f:
              data = json.load(f)

          existing_urls = [s.get("url","") for s in data.get("custom_sites", [])]
          if url in existing_urls:
              print(f"Site ja cadastrado: {url}")
              sys.exit(0)

          data["custom_sites"].append({
              "name":     name,
              "flag":     flag,
              "url":      url,
              "category": category,
          })

          with open(path, "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=True, indent=2)

          print(f"Adicionado: {name} ({category}) - {url}")
          PYEOF

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources.json
          git diff --cached --quiet || git commit -m "feat: adiciona site via issue #${{ github.event.issue.number }}"
          git push

      - name: Comentar na issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: "Site adicionado com sucesso! Sera monitorado na proxima varredura."
            });
            github.rest.issues.update({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
